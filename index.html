<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Authorized Service Center Locator - TransTech Systems</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-tt-black { background-color: #1a1a1a; }
        .bg-tt-yellow { background-color: #ffcc00; }
        .text-tt-yellow { color: #ffcc00; }
        .bg-tt-light-grey { background-color: #f2f2f2; }
        
        .content-container {
            max-width: 48rem;
            margin-left: auto;
            margin-right: auto;
            padding-left: 1.25rem;
            padding-right: 1.25rem;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900 overflow-x-hidden">

    <header class="bg-tt-black border-b-8 border-tt-yellow">
        <div class="content-container py-10 md:py-12">
            <h1 class="text-white text-3xl md:text-4xl font-black tracking-tighter uppercase italic leading-tight">
                Authorized Service Center Locator
            </h1>
            <p class="text-tt-yellow font-bold tracking-[0.3em] text-sm mt-2 uppercase">TransTech Systems</p>
        </div>
    </header>

    <main class="content-container py-12">
        
        <div class="w-full mb-8">
            <p class="text-tt-black font-medium text-[1.4rem] leading-tight max-w-2xl">
                Find your authorized service center by entering your country or city name below.
            </p>
        </div>

        <div class="w-full bg-white border border-gray-300 p-1 md:p-2 rounded shadow-inner mb-12 flex flex-row items-stretch">
            <input type="text" id="searchInput" placeholder="ENTER COUNTRY, CITY, OR STATE..." 
                   class="flex-1 p-3 md:p-4 text-sm font-bold tracking-wide outline-none uppercase placeholder:text-gray-400 min-w-0">
            <button onclick="handleSearch()" class="bg-tt-black text-tt-yellow px-6 md:px-10 py-3 md:py-4 font-black uppercase text-xs md:text-sm tracking-widest hover:bg-black transition-all whitespace-nowrap">
                Search
            </button>
        </div>

        <div id="loader" class="hidden text-center py-10 w-full">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-4 border-tt-black border-r-4 border-tt-yellow mb-4"></div>
            <p class="text-[10px] font-black uppercase tracking-widest text-tt-black">Routing Request...</p>
        </div>

        <div id="results" class="space-y-10 w-full"></div>
    </main>

    <footer class="bg-tt-black py-12 text-center border-t border-gray-800">
        <p class="text-gray-500 text-[10px] font-bold tracking-[0.3em] uppercase italic px-4">&copy; 2026 TRANSTECH SYSTEMS INC. | NON-NUCLEAR TECHNOLOGY</p>
    </footer>

    <script>
        const hq = { country: "United States (Latham, NY)", company: "TransTech Systems, Inc.", phone: "518-370-5558", attn: "Global Sales & Service", email: "sales@transtechsys.com", website: "https://transtechsys.com/", lat: 42.7534, lng: -73.7487 };

        const serviceCenters = [
            hq,
            { country: "Algeria", company: "Somagex", phone: "023-47-13-15", attn: "Mohamed Yahmi", email: "md_yahmi@hotmail.com", website: "https://somagex.dz/", lat: 28.0339, lng: 1.6596 },
            { country: "Australia", company: "Motorway Tech", phone: "+61-1300-416-313", attn: "Lorraine Duffy", email: "info@motorwaytech.com.au", website: "https://motorwaytech.com.au/", lat: -25.2744, lng: 133.7751 },
            { country: "Brazil", company: "Solotest", phone: "+5511-3289-0211", attn: "Rodrigo Barella", email: "solotest@solotest.com", website: "https://www.solotest.com/", lat: -14.2350, lng: -51.9253 },
            { country: "Chile", company: "Equipos de Auscultacion", phone: "+562 24069792", attn: "Carolina Fuentes", email: "cfuentes@eda.cl", website: "http://www.eda.cl/", lat: -35.6751, lng: -71.5430 },
            { country: "Germany", company: "MIT Mess- und Prüftechnik GmbH", phone: "+49 (0) 351/87181-25", attn: "Mrs. Andrea Ulbricht", email: "info@mit-dresden.de", website: "https://www.mit-dresden.de/", lat: 51.1657, lng: 10.4515 },
            { country: "India", company: "M/s. Taisei International", phone: "91-044-26162877", attn: "G. Parasuraman", email: "taisei@vsnl.com", website: "http://www.taiseiinternational.com/", lat: 20.5937, lng: 78.9629 },
            { country: "Japan", company: "Nishio Rent All Co., Ltd.", phone: "+816-6241-0240", attn: "Ms. Katayama", email: "k-katayama@nishio-rent.co.jp", website: "https://www.nishio-rent.co.jp/", lat: 36.2048, lng: 138.2529 },
            { country: "Norway", company: "ABAS AS", phone: "+47 32 24 35 30", attn: "Geir Solberg", email: "geir@abas.no", website: "https://www.abas.no/", lat: 60.4720, lng: 8.4689 }
        ];

        const usStates = ["AL","AK","AZ","AR","CA","CO","CT","DE","FL","GA","HI","ID","IL","IN","IA","KS","KY","LA","ME","MD","MA","MI","MN","MS","MO","MT","NE","NV","NH","NJ","NM","NY","NC","ND","OH","OK","OR","PA","RI","SC","SD","TN","TX","UT","VT","VA","WA","WV","WI","WY","ALABAMA","ALASKA","ARIZONA","ARKANSAS","CALIFORNIA","COLORADO","CONNECTICUT","DELAWARE","FLORIDA","GEORGIA","HAWAII","IDAHO","ILLINOIS","INDIANA","IOWA","KANSAS","KENTUCKY","LOUISIANA","MAINE","MARYLAND","MASSACHUSETTS","MICHIGAN","MINNESOTA","MISSISSIPPI","MISSOURI","MONTANA","NEBRASKA","NEVADA","NEW HAMPSHIRE","NEW JERSEY","NEW MEXICO","NEW YORK","NORTH CAROLINA","NORTH DAKOTA","OHIO","OKLAHOMA","OREGON","PENNSYLVANIA","RHODE ISLAND","SOUTH CAROLINA","SOUTH DAKOTA","TENNESSEE","TEXAS","UTAH","VERMONT","VIRGINIA","WASHINGTON","WEST VIRGINIA","WISCONSIN","WYOMING"];

        async function handleSearch() {
            const queryRaw = document.getElementById('searchInput').value.trim();
            const query = queryRaw.toUpperCase();
            const resultsDiv = document.getElementById('results');
            const loader = document.getElementById('loader');
            
            if (!query) return;
            resultsDiv.innerHTML = '';
            loader.classList.remove('hidden');

            if (usStates.includes(query) || query === 'CANADA' || query === 'USA' || query === 'UNITED STATES') {
                renderCard(hq, `Designated Support for ${queryRaw}:`, 0, true);
                loader.classList.add('hidden');
                return;
            }

            try {
                // Identity header added to prevent mobile browsers from blocking the request
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`, {
                    headers: { 'User-Agent': 'TransTechLocator/1.1' }
                });
                const data = await response.json();

                if (data.length > 0) {
                    const uLat = parseFloat(data[0].lat);
                    const uLng = parseFloat(data[0].lon);
                    const sorted = serviceCenters.map(c => ({...c, dist: getHaversine(uLat, uLng, c.lat, c.lng)})).sort((a,b) => a.dist - b.dist);
                    renderCard(sorted[0], `Primary Selection for ${queryRaw}:`, sorted[0].dist, true);
                    renderCard(sorted[1], `Nearest Alternative Option:`, sorted[1].dist, false);
                } else {
                    resultsDiv.innerHTML = `<div class="bg-black text-tt-yellow p-4 font-bold text-xs uppercase text-center">Location Not Found.</div>`;
                }
            } catch (error) {
                resultsDiv.innerHTML = `<div class="bg-red-600 text-white p-4 font-bold text-xs uppercase text-center">Error: Service Blocked.</div>`;
            }
            loader.classList.add('hidden');
        }

        function getHaversine(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2-lat1)*Math.PI/180; const dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function renderCard(data, title, dist, isPrimary) {
            const resultsDiv = document.getElementById('results');
            const accent = isPrimary ? "border-tt-yellow" : "border-gray-500";
            document.getElementById('results').innerHTML += `
                <div class="bg-tt-light-grey border-t-8 ${accent} shadow-lg rounded-b-lg overflow-hidden">
                    <div class="px-6 py-2 text-[9px] font-black tracking-[0.25em] bg-tt-black text-white uppercase italic">${title}</div>
                    <div class="p-6 md:p-8 text-left">
                        <h2 class="text-2xl md:text-3xl font-black text-tt-black uppercase tracking-tighter mb-1">${data.company}</h2>
                        <p class="text-tt-black font-bold text-sm tracking-widest uppercase mb-6">${data.country}</p>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 py-6 border-y border-gray-300 text-sm text-tt-black font-medium">
                            <div><p class="text-gray-500 text-[10px] font-black uppercase mb-1">Contact</p><p class="font-bold text-lg text-tt-black">${data.phone}</p><p class="text-blue-700 font-bold underline decoration-2 underline-offset-4 break-all">${data.email}</p></div>
                            <div><p class="text-gray-500 text-[10px] font-black uppercase mb-1 text-left">Office/Rep</p><p class="text-lg font-bold uppercase italic text-tt-black">${data.attn}</p></div>
                        </div>
                        <a href="${data.website}" target="_blank" class="mt-8 block text-center bg-tt-black text-tt-yellow py-4 font-black text-sm uppercase tracking-widest shadow-md">Visit Partner Website</a>
                        ${dist > 0 ? `<p class="text-sm text-gray-600 mt-4 uppercase font-bold tracking-widest italic text-right">${Math.round(dist).toLocaleString()} KM AWAY</p>` : ''}
                    </div>
                </div>`;
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSearch(); });
    </script>
</body>
</html>
